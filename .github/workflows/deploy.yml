name: Deploy App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    env:
      APPS_HOST: 192.168.178.203
      DEPLOY_USER: deployer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧠 Read config file
      - name: Read app config
        id: config
        run: |
          APP_ID=$(grep app_id app-config.yml | awk '{print $2}')
          APP_PORT=$(grep app_port app-config.yml | awk '{print $2}')
          APP_HOST=$(grep app_host app-config.yml | awk '{print $2}')

          echo "APP_ID=$APP_ID" >> $GITHUB_ENV
          echo "APP_PORT=$APP_PORT" >> $GITHUB_ENV
          echo "APP_HOST=$APP_HOST" >> $GITHUB_ENV

      - name: Show config
        run: |
          echo "App ID: $APP_ID"
          echo "Port: $APP_PORT"
          echo "Host: $APP_HOST"

      - name: Create app folder on gbs-apps
        run: |
          ssh ${DEPLOY_USER}@${APPS_HOST} "mkdir -p /opt/apps/${APP_ID}"

      - name: Sync repo to gbs-apps
        run: |
          rsync -avz --delete ./ ${DEPLOY_USER}@${APPS_HOST}:/opt/apps/${APP_ID}/

      - name: Write environment file on gbs-apps
        run: |
          ssh ${DEPLOY_USER}@${APPS_HOST} << EOF
          cat > /opt/apps/${APP_ID}/.env << EOL
          APP_ID=${APP_ID}
          APP_PORT=${APP_PORT}
          APP_HOST=${APP_HOST}
          EOL
          EOF

      - name: Deploy container on gbs-apps
        run: |
          ssh ${DEPLOY_USER}@${APPS_HOST} << EOF
          cd /opt/apps/${APP_ID}
          docker compose down || true
          docker compose up -d --build
          EOF