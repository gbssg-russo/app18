services:
  app:
    build: .
    container_name: ${APP_ID}
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SERVER_PORT: 3000
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-nsn18}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-nsn18_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-nsn18_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "${APP_PORT}:3000"
    mem_limit: 512m

  db:
    image: mysql:8.4
    container_name: ${APP_ID}-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nsn18}
      MYSQL_USER: ${MYSQL_USER:-nsn18_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nsn18_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql-data:/var/lib/mysql
    mem_limit: 512m

volumes:
  mysql-data:
