<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSN8 Shop</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/main.js" defer></script>
</head>
<body>
  <header>
    <h1>NSN8 Kleidershop</h1>
    <p>Basisstruktur für Login, Rollen, Produkte und Sicherheit.</p>
  </header>

  <main>
    <section class="card">
      <h2>API Endpunkte</h2>
      <ul>
        <li><code>GET /api/products</code> - Produktliste</li>
        <li><code>GET /api/products/:id</code> - Produktdetails</li>
        <li><code>POST /api/products</code> - Produkt anlegen (auth)</li>
        <li><code>POST /api/auth/login</code> - Login</li>
        <li><code>POST /api/auth/register</code> - Registrierung</li>
      </ul>
    </section>
  </main>
</body>
</html>
